<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Like Me - Posts</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      h1 {
        color: #333;
      }
      form {
        margin-bottom: 30px;
      }
      input,
      textarea {
        display: block;
        margin: 10px 0;
        padding: 8px;
        width: 300px;
      }
      button {
        padding: 8px 12px;
        cursor: pointer;
      }
      .post {
        border: 1px solid #ccc;
        padding: 10px;
        margin-bottom: 10px;
      }
      .post img {
        max-width: 200px;
        display: block;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Like Me - Posts</h1>

    <!-- Formulario para agregar un nuevo post -->
    <form id="postForm">
      <input
        type="text"
        id="titulo"
        placeholder="Título"
        required
        maxlength="25"
      />
      <input
        type="url"
        id="img"
        placeholder="URL de la imagen"
        required
        maxlength="1000"
      />
      <textarea
        id="descripcion"
        placeholder="Descripción"
        required
        maxlength="255"
      ></textarea>
      <button type="submit">Agregar Post</button>
    </form>

    <h2>Posts existentes</h2>
    <div id="postsContainer"></div>

    <script>
      const postsContainer = document.getElementById("postsContainer");
      const postForm = document.getElementById("postForm");

      // Función para obtener y mostrar posts
      async function cargarPosts() {
        try {
          const response = await fetch("http://localhost:3000/posts");
          const posts = await response.json();

          postsContainer.innerHTML = ""; // Limpiar contenido
          posts.forEach((post) => {
            const postDiv = document.createElement("div");
            postDiv.classList.add("post");
            postDiv.innerHTML = `
            <h3>${post.titulo}</h3>
            <img src="${post.img}" alt="${post.titulo}">
            <p>${post.descripcion}</p>
            <p>Likes: ${post.likes}</p>
          `;
            postsContainer.appendChild(postDiv);
          });
        } catch (error) {
          console.error("Error al cargar posts:", error);
          postsContainer.innerHTML = "<p>Error al cargar posts.</p>";
        }
      }

      // Función para agregar un nuevo post
      postForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const nuevoPost = {
          titulo: document.getElementById("titulo").value,
          img: document.getElementById("img").value,
          descripcion: document.getElementById("descripcion").value,
        };

        try {
          const response = await fetch("http://localhost:3000/posts", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(nuevoPost),
          });

          if (response.ok) {
            postForm.reset();
            cargarPosts(); // Recargar posts después de agregar
          } else {
            console.error("Error al agregar post");
          }
        } catch (error) {
          console.error("Error al agregar post:", error);
        }
      });

      // Cargar posts al iniciar la página
      cargarPosts();
    </script>
  </body>
</html>
